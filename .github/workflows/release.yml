name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle cache ────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── 4. Install Gradle CLI so we can generate the wrapper if missing ────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      # ── 5. Generate Gradle wrapper if not committed to repo ────────────────
      - name: Generate Gradle wrapper
        run: |
          if [ ! -f "gradlew" ]; then
            echo "gradlew not found, generating..."
            gradle wrapper --gradle-version 8.9 --distribution-type bin
          else
            echo "gradlew already exists, skipping"
          fi

      # ── 6. Gradle wrapper permissions ─────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 7. Inject osu! credentials ────────────────────────────────────────
      - name: Inject osu! OAuth credentials
        run: |
          sed -i 's|"YOUR_CLIENT_ID"|"${{ secrets.OSU_CLIENT_ID }}"|g' app/build.gradle.kts
          sed -i 's|"YOUR_CLIENT_SECRET"|"${{ secrets.OSU_CLIENT_SECRET }}"|g' app/build.gradle.kts

      # ── 8. Build DEBUG APK ─────────────────────────────────────────────────
      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ── 9. Sign & build RELEASE APK ────────────────────────────────────────
      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_type == 'release'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.keystore

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_type == 'release'
        run: ./gradlew assembleRelease --stacktrace
        env:
          SIGNING_STORE_FILE: release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # ── 10. Rename APKs ────────────────────────────────────────────────────
      - name: Rename APKs
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -f app/build/outputs/apk/debug/app-debug.apk ]; then
            mv app/build/outputs/apk/debug/app-debug.apk \
               app/build/outputs/apk/debug/osu-client-${VERSION}-debug.apk
          fi
          if [ -f app/build/outputs/apk/release/app-release.apk ]; then
            mv app/build/outputs/apk/release/app-release.apk \
               app/build/outputs/apk/release/osu-client-${VERSION}-release.apk
          fi

      # ── 11. Upload artifacts ───────────────────────────────────────────────
      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Upload release APK artifact
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.release_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      # ── 12. Create GitHub Release ──────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: osu! client ${{ github.ref_name }}
          body: |
            ## osu! Android Client ${{ github.ref_name }}

            ### Installation
            1. Download the APK below
            2. On your Android device, enable **Install from unknown sources**
            3. Install the APK
            4. Sign in with your osu! account

            ### Changes
            See commit history for changes in this release.

            > **Debug APK** — for testing, not optimized
            > **Release APK** — minified + obfuscated, production ready
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

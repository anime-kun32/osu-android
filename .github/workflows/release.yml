name: Build Debug APK

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Ensure gradle-wrapper.jar exists
        run: |
          JAR="gradle/wrapper/gradle-wrapper.jar"
          MIN_SIZE=50000
          mkdir -p gradle/wrapper
          SIZE=0
          if [ -f "$JAR" ]; then SIZE=$(stat -c%s "$JAR"); fi
          if [ "$SIZE" -lt "$MIN_SIZE" ]; then
            echo "gradle-wrapper.jar missing, downloading..."
            python3 -c "import urllib.request,os,sys; url='https://raw.githubusercontent.com/gradle/gradle/v8.4.0/gradle/wrapper/gradle-wrapper.jar'; dest='gradle/wrapper/gradle-wrapper.jar'; os.makedirs('gradle/wrapper',exist_ok=True); urllib.request.urlretrieve(url,dest); size=os.path.getsize(dest); print('Downloaded '+str(size)+' bytes'); sys.exit(0 if size>50000 else 1)"
            echo "Download complete"
          else
            echo "gradle-wrapper.jar OK, size $SIZE bytes"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: osu-client-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

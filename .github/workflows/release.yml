name: Build Debug APK

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── THE FIX: regenerate wrapper jar if missing/corrupt ──────────────
      - name: Validate or regenerate Gradle wrapper jar
        run: |
          JAR="gradle/wrapper/gradle-wrapper.jar"
          MIN_SIZE=50000  # a real jar is ~60KB; 0 or tiny = corrupt
          if [ ! -f "$JAR" ] || [ $(stat -c%s "$JAR") -lt $MIN_SIZE ]; then
            echo "⚠️  gradle-wrapper.jar missing or corrupt — regenerating..."
            # Install gradle CLI to regenerate
            curl -s "https://services.gradle.org/distributions/gradle-8.4-bin.zip" -o gradle-dist.zip
            unzip -q gradle-dist.zip -d gradle-dist
            ./gradle-dist/gradle-8.4/bin/gradle wrapper --gradle-version 8.4
            echo "✅ gradle-wrapper.jar regenerated ($(stat -c%s $JAR) bytes)"
          else
            echo "✅ gradle-wrapper.jar OK ($(stat -c%s $JAR) bytes)"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        env:
          # Suppress Gradle analytics noise
          GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: osu-client-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7
